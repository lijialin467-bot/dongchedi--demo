        0 0 0 1px #C0C0C0,
        0 0 0 4px #D8D8D8,
        0 0 0 5px #A8A8A8,
        0 0 0 8px #E8E8E8,
        0 0 0 9px #B8B8B8,
        0 25px 60px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
    }

    /* 灵动岛 */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* ========== 页面容器 ========== */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-gray);
      opacity: 0;
      visibility: hidden;
      transform: translateX(100%);
      transition: all 0.3s ease;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    .page.exit {
      transform: translateX(-30%);
      opacity: 0;
    }

    /* ========== 状态栏 ========== */
    .status-bar {
      height: 54px;
      padding: 14px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      position: relative;
      z-index: 10;
    }

    .status-time {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-battery {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .status-battery-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ========== 头部导航 ========== */
    .header {
      background: var(--card-white);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .header-back {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 12px;
    }

    .header-back svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-primary);
      stroke-width: 2;
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      position: relative;
      padding-left: 12px;
    }

    .header-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 16px;
      background: var(--dongchedi-yellow);
      border-radius: 2px;
    }

    /* ========== 内容区 ========== */
    .content {
      height: calc(100% - 54px - 52px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
    }

    .content.no-header {
      height: calc(100% - 54px);
    }

    /* ========== Step 1: 场景推荐 ========== */
    .scene-header {
      background: linear-gradient(135deg, var(--dongchedi-yellow) 0%, var(--dongchedi-orange) 100%);
      margin: -16px -16px 20px;
      padding: 24px 20px;
      text-align: center;
    }

    .scene-header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .scene-header-sub {
      font-size: 14px;
      color: rgba(26, 26, 26, 0.7);
    }

    .scene-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .scene-card {
      background: var(--card-white);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .scene-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .scene-card:active {
      transform: scale(0.98);
    }

    .scene-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .scene-card-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--dongchedi-yellow-dark);
    }

    .scene-card-content {
      flex: 1;
    }

    .scene-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .scene-card-desc {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .scene-card-arrow {
      color: var(--text-tertiary);
      font-size: 18px;
    }

    /* ========== Step 2-3: 对话流程 ========== */
    .chat-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-user .message-bubble {
      background: var(--dongchedi-yellow);
      color: var(--text-primary);
      border-radius: 18px 18px 4px 18px;
    }

    .message-ai {
      align-self: flex-start;
    }

    .message-ai .message-bubble {
      background: var(--card-white);
      color: var(--text-primary);
      border-radius: 18px 18px 18px
