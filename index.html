<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>懂车帝车主养车档案</title>
  <style>
    /* ========== 基础重置与变量 ========== */
    :root {
      --dongchedi-yellow: #FFC800;
      --dongchedi-yellow-light: #FFF8E1;
      --dongchedi-yellow-dark: #E6B400;
      --ivory-bg: #F5F5F5;
      --ivory-card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border-color: #F0F0F0;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.08);
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.04);
      --radius-lg: 24px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --green: #00B578;
      --green-light: #E8F8F0;
      --orange: #FF8F1F;
      --orange-light: #FFF4E8;
      --red: #FF4D4F;
      --red-light: #FFF1F0;
      --statusbar-bg: #FFF8E1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #F5F3EE 0%, #E8E6E0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ========== 手机容器 ========== */
    .phone-container {
      width: 430px;
      height: 932px;
      background: var(--ivory-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft), 0 0 0 1px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    /* ========== 页面基础样式 ========== */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      display: flex;
      flex-direction: column;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
    }

    /* ========== 手机状态栏（三页共用） ========== */
    .status-bar {
      flex-shrink: 0;
      height: 54px;
      padding: 14px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--statusbar-bg);
      position: relative;
      z-index: 10;
    }

    .status-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(0,0,0,0.06);
    }

    .status-time {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icons svg {
      display: block;
    }

    .status-battery {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .status-battery-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ========== 首页 - 弹窗欢迎信 ========== */
    .welcome-page {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .welcome-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
    }

    /* 弹窗卡片 */
    .welcome-modal {
      width: 100%;
      background: var(--ivory-card);
      border-radius: var(--radius-lg);
      padding: 0;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      animation: modalSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform: translateY(60px);
      opacity: 0;
    }

    @keyframes modalSlideUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* 弹窗顶部标题区 */
    .welcome-modal-header {
      background: linear-gradient(135deg, var(--dongchedi-yellow) 0%, var(--dongchedi-yellow-dark) 100%);
      padding: 24px 24px 20px;
      text-align: center;
    }

    .welcome-modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .welcome-modal-sub {
      font-size: 13px;
      color: rgba(26, 26, 26, 0.6);
    }

    /* 弹窗内容区 */
    .welcome-modal-body {
      padding: 24px;
    }

    /* 欢迎信卡片 - 暖黄渐变 */
    .letter-card {
      width: 100%;
      background: linear-gradient(145deg, #FFF8E1 0%, #FFECB3 50%, #FFE082 100%);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(255, 200, 0, 0.2);
    }

    /* 信纸纹理装饰 */
    .letter-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    .letter-card::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -20px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .letter-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .letter-icon {
      width: 44px;
      height: 44px;
      background: var(--dongchedi-yellow);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      box-shadow: 0 4px 12px rgba(230, 180, 0, 0.3);
    }

    .letter-icon svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .letter-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--dongchedi-yellow-dark);
    }

    .letter-content {
      position: relative;
      z-index: 1;
    }

    .letter-greeting {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .letter-body {
      font-size: 14px;
      color: #5D4E37;
      line-height: 2;
    }

    /* 按钮 */
    .welcome-btn-wrap {
      width: 100%;
      margin-top: 24px;
    }

    .welcome-btn {
      width: 100%;
      height: 52px;
      background: var(--dongchedi-yellow);
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 16px rgba(255, 200, 0, 0.35);
      letter-spacing: 0.5px;
    }

    .welcome-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255, 200, 0, 0.45);
    }

    .welcome-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(255, 200, 0, 0.3);
    }

    /* ========== Loading 页 ========== */
    .loading-page {
      background: var(--ivory-bg);
    }

    .loading-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .loading-car-icon {
      width: 100px;
      height: 100px;
      background: var(--dongchedi-yellow-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .loading-car-icon svg {
      width: 48px;
      height: 48px;
      fill: var(--dongchedi-yellow-dark);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .loading-text {
      font-size: 16px;
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 12px;
      text-align: center;
      min-height: 24px;
    }

    .loading-savings-num {
      display: inline-block;
      min-width: 3.2em;
      text-align: left;
    }

    .loading-subtext {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      min-height: 20px;
    }

    .loading-progress {
      width: 180px;
      height: 3px;
      background: var(--border-color);
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
    }

    .loading-progress-bar {
      height: 100%;
      background: var(--dongchedi-yellow);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ========== 报告页 ========== */
    .report-page {
      background: var(--ivory-bg);
    }

    /* 报告页导航栏 */
    .report-header {
      flex-shrink: 0;
      background: var(--ivory-card);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }

    .report-header-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .report-header-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .report-header-close:hover {
      opacity: 0.6;
    }

    .report-header-close svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-secondary);
      stroke-width: 2;
    }

    .report-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ========== 车辆头图区域 ========== */
    .car-hero {
      background: var(--ivory-card);
      padding: 20px 16px 16px;
      text-align: center;
    }

    .car-image-container {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      background: #F8F8F8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .car-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .car-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
    }

    .car-image-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
      fill: #CCC;
    }

    .car-image-placeholder span {
      font-size: 12px;
    }

    .car-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .car-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .car-tag {
      padding: 4px 10px;
      background: #F5F5F5;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .car-tag.highlight {
      background: var(--dongchedi-yellow-light);
      color: var(--dongchedi-yellow-dark);
      font-weight: 500;
    }

    /* ========== 报告板块 ========== */
    .report-section {
      background: var(--ivory-card);
      margin: 10px 12px;
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .section-header::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--dongchedi-yellow);
      border-radius: 2px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ========== 年度总览 ========== */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .overview-item {
      background: #FAFAFA;
      border-radius: var(--radius-sm);
      padding: 14px 12px;
    }

    .overview-item.full-width {
      grid-column: 1 / -1;
    }

    .overview-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .overview-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .overview-value.highlight {
      color: var(--dongchedi-yellow-dark);
    }

    .overview-subvalue {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 3px;
    }

    .overview-tip {
      display: flex;
      align-items: flex-start;
      background: var(--dongchedi-yellow-light);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 10px;
    }

    .overview-tip-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: #7A5F00;
      background: var(--dongchedi-yellow);
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      margin-top: 1px;
    }

    .overview-tip-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ========== 风险诊断 ========== */
    .risk-level {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
    }

    .risk-level.low { background: var(--green-light); }
    .risk-level.medium { background: var(--orange-light); }
    .risk-level.high { background: var(--red-light); }

    .risk-level-badge {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      margin-right: 10px;
    }

    .risk-level.low .risk-level-badge { background: var(--green); color: white; }
    .risk-level.medium .risk-level-badge { background: var(--orange); color: white; }
    .risk-level.high .risk-level-badge { background: var(--red); color: white; }

    .risk-level-text { flex: 1; }
    .risk-level-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
    .risk-level-desc { font-size: 12px; color: var(--text-secondary); }

    .risk-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .risk-item {
      display: flex;
      align-items: flex-start;
      padding: 12px;
      background: #FAFAFA;
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--green);
    }

    .risk-item.high { border-left-color: var(--red); }
    .risk-item.medium { border-left-color: var(--orange); }
    .risk-item.low { border-left-color: var(--green); }

    .risk-item-content { flex: 1; }
    .risk-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
    .risk-item-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

    /* ========== 易损件预测 ========== */
    .parts-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .part-item {
      background: #FAFAFA;
      border-radius: var(--radius-sm);
      padding: 14px;
    }

    .part-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .part-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }

    .part-probability {
      font-size: 13px;
      font-weight: 600;
      color: var(--dongchedi-yellow-dark);
      background: var(--dongchedi-yellow-light);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .part-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .part-detail { font-size: 12px; }
    .part-detail-label { color: var(--text-tertiary); }
    .part-detail-value { color: var(--text-primary); font-weight: 500; }

    .part-reason {
      background: var(--ivory-card);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .part-reason-title { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; }
    .part-reason-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

    .part-action {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: var(--dongchedi-yellow-light);
      border-radius: 6px;
    }

    .part-action-text {
      font-size: 12px;
      color: var(--dongchedi-yellow-dark);
      font-weight: 500;
    }

    /* ========== 页底引导 ========== */
    .page-footer {
      padding: 20px 16px 36px;
      text-align: center;
    }

    .swipe-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 16px;
      border-radius: var(--radius-md);
      transition: background 0.2s ease;
    }

    .swipe-indicator:hover {
      background: rgba(255, 200, 0, 0.06);
    }

    .swipe-arrow {
      width: 36px;
      height: 36px;
      background: var(--dongchedi-yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      animation: bounce 2s ease-in-out infinite;
    }

    .swipe-arrow svg {
      width: 18px;
      height: 18px;
      fill: white;
      transform: rotate(-90deg);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .swipe-text { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
    .swipe-subtext { font-size: 12px; color: var(--text-tertiary); }
    .swipe-savings { color: var(--dongchedi-yellow-dark); font-weight: 600; }

    /* ========== 响应式适配 ========== */
    @media (max-width: 470px) {
      body { padding: 0; }
      .phone-container { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="phone-container" id="phoneContainer">

    <!-- ========== 首页 - 欢迎信 ========== -->
    <div class="page welcome-page active" id="welcomePage">
      <!-- 状态栏 -->
      <div class="status-bar">
        <span class="status-time" id="statusTime1">17:28</span>
        <div class="status-icons">
          <!-- 信号 -->
          <svg width="18" height="14" viewBox="0 0 18 14">
            <rect x="0" y="10" width="3" height="4" rx="0.5" fill="#1A1A1A"/>
            <rect x="5" y="7" width="3" height="7" rx="0.5" fill="#1A1A1A"/>
            <rect x="10" y="3" width="3" height="11" rx="0.5" fill="#1A1A1A"/>
            <rect x="15" y="0" width="3" height="14" rx="0.5" fill="#1A1A1A"/>
          </svg>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="#1A1A1A"/>
            <path d="M4.5 7.5a5 5 0 017 0" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M2 5a8 8 0 0112 0" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- 电池 -->
          <div class="status-battery">
            <svg width="26" height="12" viewBox="0 0 26 12">
              <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#1A1A1A" stroke-width="1" fill="none"/>
              <rect x="2" y="2" width="18" height="8" rx="1" fill="#1A1A1A"/>
              <path d="M24 4v4a2 2 0 000-4z" fill="#1A1A1A"/>
            </svg>
            <span class="status-battery-text">90</span>
          </div>
        </div>
      </div>

      <div class="welcome-body">
        <!-- 弹窗卡片 -->
        <div class="welcome-modal">
          <!-- 弹窗顶部 -->
          <div class="welcome-modal-header">
            <h1 class="welcome-modal-title">懂车帝车主服务</h1>
            <p class="welcome-modal-sub">AI 智能养车 · 专属个性化方案</p>
          </div>

          <!-- 弹窗内容 -->
          <div class="welcome-modal-body">
            <!-- 欢迎信卡片 -->
            <div class="letter-card">
              <div class="letter-header">
                <div class="letter-icon">
                  <svg viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                  </svg>
                </div>
                <span class="letter-label">专属欢迎信</span>
              </div>
              <div class="letter-content">
                <p class="letter-greeting">您好，新车主：</p>
                <p class="letter-body">感谢您选择懂车帝。<br><br>从今天开始，<br>除了帮您买到一辆放心的车，<br><br>我们也希望帮助您更轻松地养好这辆车。<br><br>我们已经根据车辆信息，<br>为您准备了一份专属养车规划。<br><br>点击即可查看。</p>

    <!-- ========== Loading 页 ========== -->
    <div class="page loading-page" id="loadingPage">
      <div class="status-bar">

        <div class="status-icons">

            <path d="M4.5 7.5a5 5 0 017 0" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>

              <rect x="2" y="2" width="18" height="8" rx="1" fill="#1A1A1A"/>
              <path d="M24 4v4a2 2 0 000-4z" fill="#1A1A1A"/>
            </svg>
            <span class="status-battery-text">90</span>
          </div>
        </div>
      </div>

      <div class="loading-body">
        <div class="loading-car-icon">
          <svg viewBox="0 0 24 24">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
          </svg>
        </div>
        <p class="loading-text" id="loadingText">您的专属档案即将呈现</p>
        <p class="loading-text" id="loadingText2" style="display:none;">每天和我聊天五分钟，今年预计为您节省 <span class="loading-savings-num" id="loadingSavingsNum">0</span> 元</p>
        <div class="loading-progress">
          <div class="loading-progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- ========== 报告页 ========== -->
    <div class="page report-page" id="reportPage">
      <div class="status-bar">
        <span class="status-time" id="statusTime3">17:28</span>
        <div class="status-icons">
          <svg width="18" height="14" viewBox="0 0 18 14">
            <rect x="0" y="10" width="3" height="4" rx="0.5" fill="#1A1A1A"/>
            <rect x="5" y="7" width="3" height="7" rx="0.5" fill="#1A1A1A"/>
            <rect x="10" y="3" width="3" height="11" rx="0.5" fill="#1A1A1A"/>
            <rect x="15" y="0" width="3" height="14" rx="0.5" fill="#1A1A1A"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="#1A1A1A"/>
            <path d="M4.5 7.5a5 5 0 017 0" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M2 5a8 8 0 0112 0" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="status-battery">
            <svg width="26" height="12" viewBox="0 0 26 12">
              <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#1A1A1A" stroke-width="1" fill="none"/>
              <rect x="2" y="2" width="18" height="8" rx="1" fill="#1A1A1A"/>
              <path d="M24 4v4a2 2 0 000-4z" fill="#1A1A1A"/>
            </svg>
            <span class="status-battery-text">90</span>
          </div>
        </div>

      <div class="report-header">
        <span class="report-header-title">懂车帝车主·养车档案</span>
        <div class="report-header-close" id="closeBtn" title="按 Esc 也可关闭">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12"/>

      <div class="report-content" id="reportContent">
        <div class="car-hero">
          <div class="car-image-container">
            <img class="car-image" id="carImage" src="./car.jpg" alt="车辆图片" onerror="this.style.display='none'; document.getElementById('carImagePlaceholder').style.display='flex';">
            <div class="car-image-placeholder" id="carImagePlaceholder" style="display: none;">
              <svg viewBox="0 0 24 24">
                <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
              </svg>
              <span>车辆图片加载中...</span>

          </div>
          <h2 class="car-name" id="carName"></h2>
          <div class="car-tags" id="carTags"></div>

        <div class="report-section">

        <div class="report-section">
          <div class="section-header">
            <h3 class="section-title">风险诊断</h3>
          </div>
          <div id="riskSection"></div>

        <div class="report-section">
          <div class="section-header">
            <h3 class="section-title">易损件预测</h3>

          <div class="parts-list" id="partsList"></div>

        <div class="page-footer">
          <div class="swipe-indicator" id="swipeIndicator">

              <svg viewBox="0 0 24 24">
                <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
              </svg>
            </div>
            <p class="swipe-text">上滑进入下一步对话</p>
            <p class="swipe-subtext">每天与我聊天五分钟，今年预计为您节省 <span class="swipe-savings" id="footerSavings">0</span> 元</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 实时时间更新 ==========
    function updateTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const timeStr = `${h}:${m}`;
      document.getElementById('statusTime1').textContent = timeStr;
      document.getElementById('statusTime2').textContent = timeStr;
      document.getElementById('statusTime3').textContent = timeStr;
    }
    updateTime();
    setInterval(updateTime, 10000);

    // ========== Mock 数据 ==========
    const mockData = {
      owner: '张先生',
      car: {
        brand: '宝马',
        model: 'i5',
        year: '2025款',
        variant: 'eDrive40L M运动套装',
        fullName: '宝马 i5 2025款 eDrive40L M运动套装',
        mileage: 2000,
        mileageUnit: '公里',
        currentPrice: 29.98,
        priceUnit: '万',
        tags: ['准新车', '新能源', '过户少', '北京']
      },
      annualOverview: {
        costRange: { min: 8500, max: 12000 },
        nextMaintenance: {
          date: '2026年8月',
          mileage: '10000公里',
          items: ['常规检查', '空调滤芯更换', '制动系统检测']
        },
        insurance: {
          budgetRange: { min: 5800, max: 7200 },
          optimization: '建议对比三家报价，预计可节省800-1200元'
        }
      },
      riskDiagnosis: {
        level: 'low',
        levelText: '低风险',
        levelDesc: '您的车辆状况良好，继续保持定期保养',
        highRiskParts: [],
        checkAdvice: '建议每5000公里进行一次常规检查',
        focusItems: [
          { title: '轮胎磨损监测', level: 'low', description: '当前里程较低，轮胎状态良好，建议每10000公里检查一次' },
          { title: '电池健康度', level: 'low', description: '新能源车型电池状态正常，建议定期检查电池管理系统' },
          { title: '制动系统', level: 'low', description: '刹车片厚度正常，预计可使用至30000公里' }
        ]
      },
      partsPrediction: {
        items: [
          { name: '空调滤芯', probability: '85%', estimatedCost: '200-350元', reminderTime: '6个月后', reason: '北京地区空气质量因素，建议定期更换以保证车内空气质量', action: '建议每6个月或10000公里更换一次' },
          { name: '雨刮器', probability: '60%', estimatedCost: '150-300元', reminderTime: '8个月后', reason: '日常使用磨损，北方地区温差变化会影响雨刮寿命', action: '定期清洁雨刮条，避免干刮' },
          { name: '刹车油', probability: '30%', estimatedCost: '400-600元', reminderTime: '1年后', reason: '新能源车制动系统使用频率相对较低，但仍需定期检查', action: '建议每2年或40000公里更换' }
        ]
      },
      savings: { annual: 3200, daily: 8.8 }
    };

    // ========== DOM 元素 ==========
    const welcomePage = document.getElementById('welcomePage');
    const loadingPage = document.getElementById('loadingPage');
    const reportPage = document.getElementById('reportPage');
    const startBtn = document.getElementById('startBtn');
    const closeBtn = document.getElementById('closeBtn');
    const loadingText = document.getElementById('loadingText');
    const loadingText2 = document.getElementById('loadingText2');
    const loadingSavingsNum = document.getElementById('loadingSavingsNum');
    const loadingSubtext = document.getElementById('loadingSubtext');
    const progressBar = document.getElementById('progressBar');
    const reportContent = document.getElementById('reportContent');
    const swipeIndicator = document.getElementById('swipeIndicator');

    // ========== 页面切换 ==========
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    // ========== Loading 动画 ==========
    function runLoadingAnimation() {
      return new Promise((resolve) => {
        showPage('loadingPage');

        // 重置状态
        loadingText.style.display = '';
        loadingText2.style.display = 'none';
        loadingSavingsNum.textContent = '0';
        progressBar.style.width = '0%';

        const duration = 3000;
        const startTime = Date.now();
        const targetSavings = mockData.savings.annual;
        let switched = false;

        const updateInterval = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);

          // 进度条平滑增长
          progressBar.style.width = `${progress * 100}%`;

          // 1.5秒后切换到第二段文案（只切换一次）
          if (!switched && elapsed >= 1500) {
            switched = true;
            loadingText.style.display = 'none';
            loadingText2.style.display = '';
          }

          // 第二段文案：只更新数字，不碰文字
          if (switched) {
            loadingSavingsNum.textContent = Math.floor(targetSavings * progress);
          }

          if (progress >= 1) {
            clearInterval(updateInterval);
            resolve();
          }
        }, 30);
      });
    }

    // ========== 渲染报告页 ==========
    function renderReport() {
      document.getElementById('carName').textContent = mockData.car.fullName;

      const tagsContainer = document.getElementById('carTags');
      mockData.car.tags.forEach((tag, index) => {
        const tagEl = document.createElement('span');
        tagEl.className = `car-tag ${index === 0 ? 'highlight' : ''}`;
        tagEl.textContent = tag;
        tagsContainer.appendChild(tagEl);
      });

      const overviewGrid = document.getElementById('overviewGrid');
      overviewGrid.innerHTML = `
        <div class="overview-item">
          <div class="overview-label">预计年度花费</div>
          <div class="overview-value highlight">${mockData.annualOverview.costRange.min}-${mockData.annualOverview.costRange.max}元</div>
        </div>
        <div class="overview-item">
          <div class="overview-label">下次保养时间</div>
          <div class="overview-value">${mockData.annualOverview.nextMaintenance.date}</div>
          <div class="overview-subvalue">约${mockData.annualOverview.nextMaintenance.mileage}</div>
        </div>
        <div class="overview-item">
          <div class="overview-label">保险预算区间</div>
          <div class="overview-value">${mockData.annualOverview.insurance.budgetRange.min}-${mockData.annualOverview.insurance.budgetRange.max}元</div>
        </div>
        <div class="overview-item">
          <div class="overview-label">当前里程</div>
          <div class="overview-value">${mockData.car.mileage}${mockData.car.mileageUnit}</div>
          <div class="overview-subvalue">当前估值 ${mockData.car.currentPrice}${mockData.car.priceUnit}</div>
        </div>
        <div class="overview-item full-width">
          <div class="overview-tip">
            <span class="overview-tip-badge">省钱建议</span>
            <span class="overview-tip-text">${mockData.annualOverview.insurance.optimization}</span>
          </div>
        </div>
      `;

      const riskSection = document.getElementById('riskSection');
      const riskLevelClass = mockData.riskDiagnosis.level;
      riskSection.innerHTML = `
        <div class="risk-level ${riskLevelClass}">
          <span class="risk-level-badge">${mockData.riskDiagnosis.levelText}</span>
          <div class="risk-level-text">
            <div class="risk-level-title">${mockData.riskDiagnosis.levelDesc}</div>
          </div>
        </div>
        <div class="risk-items">
          ${mockData.riskDiagnosis.focusItems.map(item => `
            <div class="risk-item ${item.level}">
              <div class="risk-item-content">
                <div class="risk-item-title">${item.title}</div>
                <div class="risk-item-desc">${item.description}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      const partsList = document.getElementById('partsList');
      partsList.innerHTML = mockData.partsPrediction.items.map(part => `
        <div class="part-item">
          <div class="part-header">
            <span class="part-name">${part.name}</span>
            <span class="part-probability">${part.probability}</span>
          </div>
          <div class="part-details">
            <div class="part-detail">
              <span class="part-detail-label">预计成本：</span>
              <span class="part-detail-value">${part.estimatedCost}</span>
            </div>
            <div class="part-detail">
              <span class="part-detail-label">提醒时间：</span>
              <span class="part-detail-value">${part.reminderTime}</span>
            </div>
          </div>
          <div class="part-reason">
            <div class="part-reason-title">产生原因</div>
            <div class="part-reason-text">${part.reason}</div>
          </div>
          <div class="part-action">
            <span class="part-action-text">💡 ${part.action}</span>
          </div>
        </div>
      `).join('');

      document.getElementById('footerSavings').textContent = mockData.savings.annual;
    }

    // ========== 事件绑定 ==========
    startBtn.addEventListener('click', async () => {
      await runLoadingAnimation();
      showPage('reportPage');
      reportContent.scrollTop = 0;
    });

    closeBtn.addEventListener('click', () => showPage('welcomePage'));

    swipeIndicator.addEventListener('click', () => {
      alert('即将进入对话界面...\n\n此功能为演示，实际产品中会进入AI对话页面');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && reportPage.classList.contains('active')) {
        showPage('welcomePage');
      }
    });

    // ========== 初始化 ==========
    renderReport();
  </script>
</body>
</html>
